<!DOCTYPE html>
<html>
<head>
  <title>Geo-Fencing Attendance</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #result, #debug { margin-top: 20px; font-size: 16px; }
    pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
  </style>
</head>
<body>

<h2>Geo-Fencing Attendance</h2>
<button id="checkBtn">Check In</button>
<p id="result"></p>
<h3>Debug Info:</h3>
<pre id="debug"></pre>

<script>
const resultEl = document.getElementById("result");
const debugEl = document.getElementById("debug");
const btn = document.getElementById("checkBtn");

btn.addEventListener("click", () => {

  if (!navigator.geolocation) {
    resultEl.innerHTML = "Geolocation not supported by your browser.";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      // ✅ Properly extract coordinates
      const latitude = position.coords.latitude;
      const longitude = position.coords.longitude;
      const accuracy = position.coords.accuracy;

      console.log("Coords:", { latitude, longitude, accuracy });
      debugEl.textContent = JSON.stringify(position, null, 2);

      try {
        const response = await fetch("/check-location", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ latitude, longitude, accuracy })
        });

        const data = await response.json();
        console.log("Server response:", data);

        // ✅ Render correctly
        resultEl.innerHTML = `
          <strong>${data.message}</strong><br>
          Latitude: ${data.latitude}<br>
          Longitude: ${data.longitude}<br>
          Accuracy: ${data.accuracy} meters<br>
          Distance from office: ${data.distance} meters
        `;

      } catch (err) {
        console.error("Fetch error:", err);
        resultEl.innerHTML = "Error fetching location from server.";
      }

    },
    (err) => {
      console.error("Geolocation error:", err);
      debugEl.textContent = JSON.stringify(err, null, 2);
      resultEl.innerHTML = `Error getting location: ${err.message} (code ${err.code})`;
    },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
  );

});
</script>

</body>
</html>
